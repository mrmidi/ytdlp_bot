services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_LOCAL: 1
    volumes:
      - telegram-api-data:/var/lib/telegram-bot-api
      - ./tmp:/app/tmp

  bot:
    build: .
    image: ytdlp_bot:latest
    restart: unless-stopped
    depends_on:
      - telegram-bot-api
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp

volumes:
  telegram-api-data:
